name: Publish HakiAPI to PyPI

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and Upload
    runs-on: ubuntu-latest
    environment: pypi
    
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          
      - name: Install build engines
        run: python -m pip install --upgrade pip build
        
      - name: Compile the distribution
        run: python -m build
        
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
